name: probe rank cats

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: write probe script
        run: |
          cat << 'JS_EOF' > probe.js
          const https = require('https');
          const fs    = require('fs');
          const categories = JSON.parse(fs.readFileSync('categories_1-2000.json', 'utf-8'));
          const ALL_CAT_IDS = categories.map(c => c.id);
          // Resume: bỏ qua các cat_id đã probe thành công, bắt đầu từ cat_id bị dừng
          const outPath = 'data/valid_rank_cats.json';
          let existing = { rankMold2: [], rankMold1: [] };
          if (fs.existsSync(outPath)) {
            try { existing = JSON.parse(fs.readFileSync(outPath, 'utf-8')); } catch(e) {}
          }
          const lastProbed = existing.last_probed_cat_id ?? null;
          let startIdx = 0;
          if (lastProbed !== null) {
            const idx = ALL_CAT_IDS.indexOf(lastProbed);
            // Resume từ chính cat_id bị dừng (idx), không phải idx+1
            startIdx = idx >= 0 ? idx : 0;
            console.log('Resuming from cat_id=' + ALL_CAT_IDS[startIdx] + ' (index ' + startIdx + ')');
          } else {
            console.log('Starting fresh from cat_id=' + ALL_CAT_IDS[0]);
          }
          const CAT_IDS = ALL_CAT_IDS.slice(startIdx);
          function httpGet(url) {
            return new Promise((resolve, reject) => {
              https.get(url, {
                headers: { 'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json' },
                timeout: 15000,
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve({ status: res.statusCode, data }));
              }).on('error', reject).on('timeout', () => reject(new Error('timeout')));
            });
          }
          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
          async function probeOne(catId, gender, rankMold) {
            const url = 'https://fanqienovel.com/api/rank/category/list?app_id=2503&rank_list_type=3&offset=0&limit=1&category_id=' + catId + '&rank_version=&gender=' + gender + '&rankMold=' + rankMold;
            const res = await httpGet(url);
            if (res.status !== 200) return { ok: false, error: 'HTTP ' + res.status };
            let json;
            try { json = JSON.parse(res.data); }
            catch(e) { return { ok: false, stopAll: true, error: 'JSON parse error: ' + e.message }; }
            return { ok: true, totalNum: json?.data?.total_num ?? 0 };
          }
          async function main() {
            const result = { rankMold2: [], rankMold1: [] };
            let stopped = false;
            let lastProbedCatId = null;
            for (const catId of CAT_IDS) {
              if (stopped) break;
              console.log('\n── cat_id=' + catId + ' ──');
              for (const gender of [0, 1]) {
                if (stopped) break;
                const r = await probeOne(catId, gender, 2);
                if (r.stopAll) { console.log('  [mold=2 g=' + gender + '] STOP: ' + r.error); stopped = true; break; }
                console.log('  [mold=2 g=' + gender + '] total_num=' + (r.ok ? r.totalNum : r.error));
                if (r.ok && r.totalNum > 0) { result.rankMold2.push(gender === 0 ? { cat_id: Number(catId) } : { cat_id: Number(catId), gender }); break; }
                if (!r.ok) break;
                await sleep(400);
              }
              if (stopped) break;
              await sleep(400);
              for (const gender of [0, 1]) {
                if (stopped) break;
                const r = await probeOne(catId, gender, 1);
                if (r.stopAll) { console.log('  [mold=1 g=' + gender + '] STOP: ' + r.error); stopped = true; break; }
                console.log('  [mold=1 g=' + gender + '] total_num=' + (r.ok ? r.totalNum : r.error));
                if (r.ok && r.totalNum > 0) { result.rankMold1.push(gender === 0 ? { cat_id: Number(catId) } : { cat_id: Number(catId), gender }); break; }
                if (!r.ok) break;
                await sleep(400);
              }
              if (!stopped) {
                lastProbedCatId = catId;
                await sleep(600);
              }
            }
            console.log('\n══ RESULT ══');
            console.log('rankMold2: ' + JSON.stringify(result.rankMold2));
            console.log('rankMold1: ' + JSON.stringify(result.rankMold1));
            function merge(oldList, newList) {
              const map = {};
              for (const e of (oldList || [])) map[e.cat_id] = e;
              for (const e of newList) map[e.cat_id] = e;
              return Object.values(map).sort((a, b) => a.cat_id - b.cat_id);
            }
            const merged = {
              updated_at: new Date().toISOString(),
              // Nếu bị dừng: giữ last_probed_cat_id là cat_id bị lỗi (để resume từ đó)
              // Nếu hoàn thành hết: xóa last_probed_cat_id
              ...(stopped
                ? { last_probed_cat_id: lastProbedCatId } 
                : {}),
              rankMold2: merge(existing.rankMold2, result.rankMold2),
              rankMold1: merge(existing.rankMold1, result.rankMold1),
            };
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync(outPath, JSON.stringify(merged, null, 2), 'utf-8');
            console.log('\nSaved ' + outPath + ' | mold2: ' + merged.rankMold2.length + ' | mold1: ' + merged.rankMold1.length);
            if (stopped && lastProbedCatId !== null)
              console.log('Resume point saved: last_probed_cat_id=' + lastProbedCatId);
            if (!stopped)
              console.log('All cat_ids probed successfully!');
          }
          main().catch(e => { console.error('Fatal:', e.message); process.exit(1); });
          JS_EOF

      - name: run probe
        run: node probe.js

      - name: save
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/valid_rank_cats.json
          git diff --cached --quiet || git commit -m "probe rank cats $(date -u '+%Y-%m-%d')"
          git push
