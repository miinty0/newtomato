name: Scan Categories
on:
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run scan
        run: node scan-categories.js 2>&1 | tee categories_result.txt
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: categories-result
          path: categories_result.txt
