name: Scan Categories

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Category ID start'
        default: '1'
      end:
        description: 'Category ID end'
        default: '1000'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scan-categories.js ${{ github.event.inputs.start }} ${{ github.event.inputs.end }} 2>&1 | tee result.txt
