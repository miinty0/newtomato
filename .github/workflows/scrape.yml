name: daily

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 05:00 UTC+7
  workflow_dispatch:        # manual trigger from Actions tab or index.html
    inputs:
      category_id:
        description: 'Category ID (-1 for all)'
        required: false
        default: '-1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
      - name: run
        run: node scraper.js --category ${{ github.event.inputs.category_id || -1 }}

      - name: save
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "$(date -u '+%Y-%m-%d')"
          git push
