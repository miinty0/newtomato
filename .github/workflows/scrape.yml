name: daily

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      category_id:
        description: 'Category ID (-1 for all)'
        required: false
        default: '-1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: run
        run: node scraper.js --category ${{ github.event.inputs.category_id || -1 }}

      - name: save to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r data/ /tmp/data-backup/
          git fetch origin data
          git checkout data
          cp -r /tmp/data-backup/* data/
          git add data/
          git diff --cached --quiet || git commit -m "$(date -u '+%Y-%m-%d')"
          git push origin data
