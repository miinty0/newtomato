<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<style>
:root {
  --bg:      #0d0d12;
  --bg2:     #14141c;
  --bg3:     #1c1c28;
  --card:    #181824;
  --border:  #26263a;
  --text:    #e6e6f0;
  --text2:   #8888aa;
  --accent:  #f06bab;
  --accent2: #ff9cd3;
  --green:   #4ade80;
  --red:     #f87171;
  --yellow:  #fbbf24;
  --tag-bg:  rgba(240,107,171,0.12);
  --tag-text:#ff9cd3;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }

/* Header */
.header { background:linear-gradient(135deg,#14141f,#10101a); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
.header-inner { max-width:1200px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.logo h1 { font-size:17px; font-weight:700; color:var(--accent); }
.logo .subtitle { font-size:11px; color:var(--text2); margin-top:1px; }
.header-right { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.update-badge { background:var(--bg3); padding:5px 13px; border-radius:20px; font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; }
.update-badge .dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.hdr-btn { padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer; transition:all .2s; border:1px solid var(--border); background:var(--bg2); color:var(--text2); white-space:nowrap; }
.hdr-btn:hover { border-color:var(--accent); color:var(--accent); }

/* Controls */
.controls { max-width:1200px; margin:14px auto; padding:0 24px; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.search-box { flex:1; min-width:180px; max-width:300px; position:relative; }
.search-box input { width:100%; padding:8px 12px 8px 34px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; outline:none; transition:border-color .2s; }
.search-box input:focus { border-color:var(--accent); }
.search-box input::placeholder { color:var(--text2); }
.search-box .icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:13px; }
.filter-btn { padding:7px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--text2); font-size:12px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.filter-btn:hover { border-color:var(--accent); color:var(--text); }
.filter-btn.active { background:rgba(240,107,171,.15); border-color:var(--accent); color:var(--accent); }
.filter-btn.new-btn .new-count { display:inline-flex; align-items:center; justify-content:center; min-width:17px; height:17px; padding:0 4px; border-radius:9px; background:var(--yellow); color:#000; font-size:10px; font-weight:700; margin-left:5px; }
.filter-btn.new-btn.active { background:rgba(251,191,36,.18); border-color:var(--yellow); color:var(--yellow); }
.filter-btn.new-btn:hover { border-color:var(--yellow); color:var(--yellow); }
.filter-btn.new-btn.no-new { opacity:.5; cursor:default; }

/* History row */
.history-row { max-width:1200px; margin:0 auto 4px; padding:0 24px; display:flex; align-items:center; gap:8px; }
.history-select { padding:7px 11px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:12px; outline:none; cursor:pointer; }
.del-hist-btn { padding:6px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--text2); font-size:12px; cursor:pointer; transition:all .2s; display:none; }
.del-hist-btn:hover { border-color:var(--red); color:var(--red); }
.del-hist-btn.visible { display:inline-block; }

/* Book list */
.book-list { max-width:1200px; margin:12px auto; padding:0 24px 40px; }

.book-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px 18px; margin-bottom:9px;
  display:flex; gap:14px; align-items:stretch; transition:all .2s;
}
.book-card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 4px 20px rgba(240,107,171,.08); }
.book-card.is-new { border-color:rgba(251,191,36,.30); background:linear-gradient(135deg,var(--card),rgba(251,191,36,.04)); }
.book-card.is-new:hover { border-color:var(--yellow); box-shadow:0 4px 20px rgba(251,191,36,.10); }

/* Rank col */
.rank-col { flex-shrink:0; width:48px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
.rank-num { font-size:22px; font-weight:800; line-height:1; }
.rank-1 { color:#ffd700; text-shadow:0 0 12px rgba(255,215,0,.3); }
.rank-2 { color:#c0c0c0; }
.rank-3 { color:#cd7f32; }
.rank-other { color:var(--text2); }
.rank-label { font-size:9px; color:var(--text2); letter-spacing:.5px; }
.rank-change { font-size:10px; font-weight:600; }
.rank-up { color:var(--green); }
.rank-down { color:var(--red); }
.rank-same { color:var(--text2); }
.rank-new { color:var(--yellow); font-size:9px; font-weight:700; background:rgba(251,191,36,.15); padding:1px 5px; border-radius:4px; }

/* Cover */
.cover-col { flex-shrink:0; width:68px; }
.cover-img { width:68px; height:90px; border-radius:7px; object-fit:cover; background:var(--bg3); border:1px solid var(--border); }

/* Info */
.info-col { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
.book-title { font-size:15px; font-weight:700; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book-id { font-size:10px; color:var(--text2); margin-bottom:5px; font-family:monospace; }
.book-meta { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.author-name { font-size:12px; color:var(--text2); }
.status-badge { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; }
.status-ongoing   { background:rgba(74,222,128,.12); color:var(--green); }
.status-completed { background:rgba(153,153,179,.12); color:var(--text2); }
.chapter-time { font-size:10px; color:var(--text2); }
.tag-list { display:flex; gap:4px; flex-wrap:wrap; }
.tag { font-size:10px; padding:2px 7px; border-radius:4px; background:var(--tag-bg); color:var(--tag-text); }
a.book-title { color: inherit; text-decoration: none; cursor: pointer; }
a.book-title:hover { color: var(--accent); }
  
/* Abstract */
.abstract-col { flex:1 1 340px; max-width:500px; ... }
.abstract-text { font-size:12px; color:var(--text2); line-height:1.65; white-space: pre-line; }

/* Mark read button */
.mark-read-btn { flex-shrink:0; align-self:center; padding:6px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg2); color:var(--text2); font-size:11px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.mark-read-btn:hover { border-color:var(--accent); color:var(--accent); }
.mark-read-btn.marking { opacity:.5; cursor:not-allowed; }

/* Loading / empty */
.loading { text-align:center; padding:60px 0; color:var(--text2); }
.loading .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty-state { text-align:center; padding:60px 0; color:var(--text2); }

/* Read list panel */
.read-panel { max-width:1200px; margin:0 auto 16px; padding:0 24px; }
.read-panel-inner { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px 18px; }
.read-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; cursor:pointer; }
.read-panel-title { font-size:13px; font-weight:600; color:var(--text); }
.read-panel-count { font-size:11px; color:var(--text2); }
.read-panel-body { display:none; }
.read-panel-body.open { display:block; }
.read-input-row { display:flex; gap:8px; margin-bottom:10px; }
.read-input { flex:1; padding:7px 11px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; font-family:monospace; }
.read-input:focus { border-color:var(--accent); }
.read-input::placeholder { color:var(--text2); }
.add-read-btn { padding:7px 14px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .2s; white-space:nowrap; }
.add-read-btn:hover { opacity:.85; }
.read-chips { display:flex; gap:6px; flex-wrap:wrap; }
.read-chip { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:11px; color:var(--text2); font-family:monospace; display:flex; align-items:center; gap:5px; }
.read-chip .rm { cursor:pointer; color:var(--red); font-size:13px; line-height:1; }
.read-chip .rm:hover { opacity:.7; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:26px; width:400px; max-width:90vw; }
.modal h2 { font-size:15px; font-weight:700; margin-bottom:5px; }
.modal p { font-size:12px; color:var(--text2); margin-bottom:16px; line-height:1.5; }
.modal-label { font-size:11px; color:var(--text2); margin-bottom:4px; display:block; }
.modal input { width:100%; padding:9px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:9px; color:var(--text); font-size:13px; outline:none; margin-bottom:9px; }
.modal input:focus { border-color:var(--accent); }
.modal input::placeholder { color:var(--text2); }
.modal-actions { display:flex; gap:8px; margin-top:4px; }
.modal-btn { flex:1; padding:8px; border-radius:9px; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; border:none; }
.modal-btn.primary { background:var(--accent); color:#fff; }
.modal-btn.secondary { background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
.modal-btn.secondary:hover { border-color:var(--accent); }
.modal-btn.danger { background:rgba(248,113,113,.15); color:var(--red); border:1px solid rgba(248,113,113,.3); }
.modal-status { font-size:11px; margin-top:8px; text-align:center; min-height:16px; }
.modal-status.ok { color:var(--green); }
.modal-status.err { color:var(--red); }

/* Submit bar */
.submit-bar {
  display: none; position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--accent);
  border-radius: 12px; padding: 12px 20px;
  display: none; align-items: center; justify-content: space-between;
  gap: 20px; font-size: 13px; color: var(--text);
  box-shadow: 0 4px 24px rgba(240,107,171,.2);
  z-index: 200; min-width: 280px;
}
.submit-bar.show { display: flex; }
.submit-confirm { padding: 7px 18px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.submit-confirm:hover { opacity: .85; }
.submit-cancel  { padding: 7px 14px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 13px; cursor: pointer; }
.submit-cancel:hover { border-color: var(--red); color: var(--red); }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--bg2); border:1px solid var(--border); padding:9px 18px; border-radius:10px; font-size:12px; opacity:0; transition:all .3s; z-index:2000; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { border-color:var(--green); color:var(--green); }
.toast.err { border-color:var(--red);   color:var(--red); }

/* Responsive */
@media (max-width:900px) { .abstract-col { flex:0 0 220px; max-width:220px; } }
@media (max-width:700px) {
  .header-inner,.controls,.book-list,.history-row,.read-panel { padding-left:14px; padding-right:14px; }
  .book-card { padding:12px; gap:10px; flex-wrap:wrap; }
  .abstract-col { flex:0 0 100%; max-width:100%; border-left:none; border-top:1px solid var(--border); padding-left:0; padding-top:10px; margin-left:0; margin-top:4px; }
  .mark-read-btn { width:100%; }
}
@media (max-width:480px) { .cover-col { display:none; } .header-right { width:100%; } }
</style>
</head>
<body>

<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h2>Admin Setup</h2>
    <p>GitHub PAT with <code>repo</code> + <code>workflow</code> scopes. Saved in browser only.</p>
    <label class="modal-label">Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <label class="modal-label">Repo (owner/name)</label>
    <input type="text" id="repoInput" placeholder="yourname/your-repo">
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeTokenModal()">Cancel</button>
      <button class="modal-btn danger" onclick="clearToken()">Clear</button>
      <button class="modal-btn primary" onclick="saveToken()">Save</button>
    </div>
    <div class="modal-status" id="tokenStatus"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <h1>For You</h1>
      <div class="subtitle">Top unread picks · Daily</div>
    </div>
    <div class="header-right">
      <div class="update-badge"><span class="dot"></span><span id="updateTime">Loading...</span></div>
      <button class="hdr-btn" id="triggerBtn" onclick="triggerScrape()">▶ Run now</button>
      <button class="hdr-btn" onclick="openTokenModal()">🔑 Token</button>
    </div>
  </div>
</header>

<!-- Read list panel -->
<div class="read-panel">
  <div class="read-panel-inner">
    <div class="read-panel-header" onclick="toggleReadPanel()">
      <span class="read-panel-title">📚 My List <span class="read-panel-count" id="readCount">(0 books)</span></span>
      <span id="readPanelArrow" style="color:var(--text2);font-size:12px">▼</span>
    </div>
    <div class="read-panel-body" id="readPanelBody">
      <div class="read-input-row">
        <input class="read-input" id="readIdInput" placeholder="Enter book_id to mark as read..." onkeydown="if(event.key==='Enter')addReadId()">
        <button class="add-read-btn" onclick="addReadId()">+ Add</button>
      </div>
      <div class="read-chips" id="readChips"></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search title, author, tag...">
  </div>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn new-btn" data-filter="new" id="newFilterBtn">
    🆕 New <span class="new-count" id="newCount">0</span>
  </button>
  <button class="filter-btn" data-filter="ongoing">Ongoing</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
</div>

<div class="history-row">
  <select class="history-select" id="historySelect"><option value="">📅 History</option></select>
  <button class="del-hist-btn" id="delHistBtn" onclick="deleteSelectedHistory()">🗑 Delete</button>
</div>

<div class="book-list" id="bookList">
  <div class="loading"><div class="spinner"></div><div>Loading...</div></div>
</div>

<!-- Submit bar -->
<div class="submit-bar" id="submitBar">
  <span><span id="submitCount">0</span> books marked as read</span>
  <div style="display:flex;gap:8px">
    <button onclick="cancelReads()" class="submit-cancel">Cancel</button>
    <button onclick="submitReads()" id="submitBtn" class="submit-confirm">Submit</button>
  </div>
</div>

<script>
// ── State ──
let allBooks    = [];
let currentFilter = 'all';
let currentSearch = '';
let historyDates  = [];
let readSet       = new Set();
let readPanelOpen = false;

// ── Token ──
const getToken = () => localStorage.getItem('gh_token') || '';
const getRepo  = () => localStorage.getItem('gh_repo')  || '';

function openTokenModal() {
  document.getElementById('tokenInput').value = getToken();
  document.getElementById('repoInput').value  = getRepo();
  document.getElementById('tokenStatus').textContent = '';
  document.getElementById('tokenModal').classList.add('open');
}
function closeTokenModal() { document.getElementById('tokenModal').classList.remove('open'); }
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  const r = document.getElementById('repoInput').value.trim();
  if (!t || !r) { setModalStatus('Both fields required','err'); return; }
  localStorage.setItem('gh_token', t); localStorage.setItem('gh_repo', r);
  setModalStatus('Saved ✓','ok'); setTimeout(closeTokenModal, 700);
}
function clearToken() {
  localStorage.removeItem('gh_token'); localStorage.removeItem('gh_repo');
  document.getElementById('tokenInput').value = '';
  document.getElementById('repoInput').value  = '';
  setModalStatus('Cleared','ok');
}
function setModalStatus(m, t) { const el = document.getElementById('tokenStatus'); el.textContent = m; el.className = 'modal-status ' + (t||''); }

// ── Toast ──
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Read panel ──
function toggleReadPanel() {
  readPanelOpen = !readPanelOpen;
  document.getElementById('readPanelBody').classList.toggle('open', readPanelOpen);
  document.getElementById('readPanelArrow').textContent = readPanelOpen ? '▲' : '▼';
}

function renderReadChips() {
  const container = document.getElementById('readChips');
  document.getElementById('readCount').textContent = `(${readSet.size} books)`;
  if (readSet.size === 0) { container.innerHTML = '<span style="font-size:11px;color:var(--text2)">No books added yet</span>'; return; }
  container.innerHTML = [...readSet].map(id => `
    <div class="read-chip">
      ${id}
      <span class="rm" onclick="removeReadId('${id}')" title="Remove">×</span>
    </div>`).join('');
}

async function addReadId() {
  const input = document.getElementById('readIdInput');
  const id = input.value.trim();
  if (!id) return;
  if (readSet.has(id)) { toast('Already in read list', 'err'); return; }
  readSet.add(id);
  input.value = '';
  renderReadChips();
  await saveReadList();
}

async function removeReadId(id) {
  readSet.delete(id);
  renderReadChips();
  await saveReadList();
}

function updateSubmitBar() {
  const bar = document.getElementById('submitBar');
  const count = document.getElementById('submitCount');
  if (pendingReads.size > 0) {
    bar.classList.add('show');
    count.textContent = pendingReads.size;
  } else {
    bar.classList.remove('show');
  }
}

async function submitReads() {
  const btn = document.getElementById('submitBtn');
  btn.textContent = '⏳ Saving...'; btn.style.pointerEvents = 'none';
  for (const id of pendingReads) readSet.add(id);
  pendingReads.clear();
  renderReadChips();
  await saveReadList();
  // fade out marked cards
  allBooks = allBooks.filter(b => !readSet.has(b.book_id));
  applyFilters();
  updateSubmitBar();
  btn.textContent = 'Submit'; btn.style.pointerEvents = '';
}

function cancelReads() {
  // restore buttons
  pendingReads.forEach(id => {
    const btn = document.querySelector(`[onclick*="'${id}'"]`);
    if (btn) { btn.textContent = '✓ Mark read'; btn.classList.remove('marking'); }
  });
  pendingReads.clear();
  updateSubmitBar();
}
async function loadReadList() {
  const token = getToken(), repo = getRepo();
  if (!token || !repo) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/data/read.json`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (res.ok) {
      const info = await res.json();
      const arr  = JSON.parse(atob(info.content));
      readSet = new Set(arr);
      renderReadChips();
    }
  } catch(e) {}
}

async function saveReadList() {
  const token = getToken(), repo = getRepo();
  if (!token || !repo) { toast('Set token first', 'err'); return; }
  const arr = [...readSet];
  const gh = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
  try {
    let sha;
    const chk = await fetch(`https://api.github.com/repos/${repo}/contents/data/read.json`, { headers: gh });
    if (chk.ok) sha = (await chk.json()).sha;
    await fetch(`https://api.github.com/repos/${repo}/contents/data/read.json`, {
      method: 'PUT', headers: gh,
      body: JSON.stringify({ message: 'update read list', sha, content: btoa(JSON.stringify(arr, null, 2)) }),
    });
    toast('✓ Read list saved', 'ok');
  } catch(e) { toast('✗ Failed to save', 'err'); }
}

// ── Mark read from card ──
let pendingReads = new Set(); // marked but not yet saved

async function markRead(bookId, btn) {
  if (readSet.has(bookId) || pendingReads.has(bookId)) return;
  pendingReads.add(bookId);
  btn.textContent = '✓ Marked';
  btn.classList.add('marking');
  updateSubmitBar();
}

// ── Trigger scrape ──
async function triggerScrape() {
  const token = getToken(), repo = getRepo();
  if (!token || !repo) { openTokenModal(); return; }
  const today = new Date().toISOString().slice(0,10);
  if (historyDates.includes(today)) {
    if (!confirm(`Data for ${today} already exists. Overwrite?`)) return;
  }
  const btn = document.getElementById('triggerBtn');
  btn.textContent = '⏳...'; btn.style.pointerEvents = 'none';
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/scrape.yml/dispatches`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: 'main' }),
    });
    res.status === 204 ? toast('✓ Triggered — check Actions in ~1 min', 'ok') : toast(`✗ Failed (${res.status})`, 'err');
  } catch(e) { toast('✗ Network error', 'err'); }
  btn.textContent = '▶ Run now'; btn.style.pointerEvents = '';
}

// ── Delete history ──
async function deleteSelectedHistory() {
  const token = getToken(), repo = getRepo();
  if (!token || !repo) { openTokenModal(); return; }
  const date = document.getElementById('historySelect').value;
  if (!date || !confirm(`Delete ${date}?`)) return;
  const btn = document.getElementById('delHistBtn');
  btn.textContent = '⏳'; btn.style.pointerEvents = 'none';
  const gh = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
  try {
    const infoRes = await fetch(`https://api.github.com/repos/${repo}/contents/data/history/${date}.json`, { headers: gh });
    if (!infoRes.ok) { toast('✗ File not found', 'err'); return; }
    const { sha } = await infoRes.json();
    await fetch(`https://api.github.com/repos/${repo}/contents/data/history/${date}.json`, {
      method: 'DELETE', headers: gh, body: JSON.stringify({ message: `remove ${date}`, sha }),
    });
    const idxRes = await fetch(`https://api.github.com/repos/${repo}/contents/data/history_index.json`, { headers: gh });
    if (idxRes.ok) {
      const idxInfo = await idxRes.json();
      const newIdx  = JSON.parse(atob(idxInfo.content)).filter(d => d !== date);
      await fetch(`https://api.github.com/repos/${repo}/contents/data/history_index.json`, {
        method: 'PUT', headers: gh,
        body: JSON.stringify({ message: `remove ${date} from index`, sha: idxInfo.sha, content: btoa(JSON.stringify(newIdx, null, 2)) }),
      });
      historyDates = newIdx;
      rebuildHistoryDropdown(newIdx);
    }
    toast(`✓ Deleted ${date}`, 'ok');
  } catch(e) { toast('✗ Error: ' + e.message, 'err'); }
  btn.textContent = '🗑 Delete'; btn.style.pointerEvents = '';
}

// ── Data ──
async function loadData(date) {
  try {
    const res = await fetch(date ? `data/history/${date}.json` : 'data/latest.json');
    if (!res.ok) throw new Error();
    return await res.json();
  } catch(e) { return null; }
}
async function loadHistoryIndex() {
  try { const r = await fetch('data/history_index.json'); return r.ok ? await r.json() : []; }
  catch { return []; }
}

function rebuildHistoryDropdown(dates) {
  const sel = document.getElementById('historySelect');
  sel.innerHTML = '<option value="">📅 History</option>';
  for (const d of dates) { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); }
  document.getElementById('delHistBtn').classList.remove('visible');
}

// ── Render ──
function fmtTimestamp(ts) {
  if (!ts) return '';
  const d = new Date(Number(ts) * 1000);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderRankChange(change) {
  if (change === 'new') return `<span class="rank-change rank-new">NEW</span>`;
  if (change === 0)     return `<span class="rank-change rank-same">—</span>`;
  if (change > 0)       return `<span class="rank-change rank-up">▲${change}</span>`;
  if (change < 0)       return `<span class="rank-change rank-down">▼${Math.abs(change)}</span>`;
  return '';
}

function renderBookCard(book) {
  const b64 = btoa('https://fanqienovel.com/page/' + book.book_id);
  const rankClass   = book.hot_rank <= 3 ? `rank-${book.hot_rank}` : 'rank-other';
  const statusClass = book.status === 'Ongoing' ? 'status-ongoing' : 'status-completed';
  const isNew = book.rank_change === 'new';
  let cover = book.thumb_url || '';
  if (cover.startsWith('http://')) cover = cover.replace('http://','https://');
  const ph = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='68' height='90'><rect width='68' height='90' fill='%231c1c28'/><text x='34' y='48' text-anchor='middle' fill='%23666' font-size='20'>📖</text></svg>`;
  const chapterDate = fmtTimestamp(book.last_chapter_time);
  return `
    <div class="book-card ${isNew?'is-new':''}">
      <div class="rank-col">
        <div class="rank-num ${rankClass}">${book.hot_rank}</div>
        <div class="rank-label">HOT</div>
        ${renderRankChange(book.rank_change)}
      </div>
      <div class="cover-col">
<img class="cover-img" src="${cover}" alt="" loading="lazy" 
     referrerpolicy="no-referrer"
     onerror="this.src='${ph}'">
      </div>
      <div class="info-col">
<div class="book-title" style="cursor:pointer" onclick="window.open('https://fanqienovel.com/page/${book.book_id}','_blank')">${esc(book.book_name)}</div>        <div class="book-id">${esc(book.book_id)}</div>
        <div class="book-meta">
          <span class="author-name">✍ ${esc(book.author)}</span>
          <span class="status-badge ${statusClass}">${book.status}</span>
          ${chapterDate ? `<span class="chapter-time">📅 ${chapterDate}</span>` : ''}
        </div>
        <div class="tag-list">${(book.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      </div>
      <div class="abstract-col">
        <div class="abstract-text">${esc(book.abstract)}</div>
      </div>
      <button class="mark-read-btn" onclick="markRead('${esc(book.book_id)}',this)">✓ Mark read</button>
    </div>`;
}

function esc(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderBookList(books) {
  const c = document.getElementById('bookList');
  if (!books || books.length === 0) {
    c.innerHTML = `<div class="empty-state">${currentFilter==='new'?'😊 No new picks today':'😢 No results'}</div>`;
    return;
  }
  c.innerHTML = books.map(renderBookCard).join('');
}

function renderStats(data) {
  if (!data) return;
  let newCount = 0;
  for (const b of data.books) if (b.rank_change === 'new') newCount++;
  document.getElementById('newCount').textContent = newCount;
  const btn = document.getElementById('newFilterBtn');
  if (newCount > 0) btn.classList.remove('no-new');
  else              btn.classList.add('no-new');
}

function applyFilters() {
  let f = [...allBooks];
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    f = f.filter(b =>
      b.book_name.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q) ||
      (b.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
      (b.abstract||'').toLowerCase().includes(q)
    );
  }
  switch(currentFilter) {
    case 'new':       f = f.filter(b => b.rank_change === 'new');    break;
    case 'ongoing':   f = f.filter(b => b.status === 'Ongoing');     break;
    case 'completed': f = f.filter(b => b.status === 'Completed');   break;
  }
  renderBookList(f);
}

// ── Events ──
function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', e => { currentSearch = e.target.value.trim(); applyFilters(); });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('no-new')) return;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); currentFilter = btn.dataset.filter; applyFilters();
    });
  });
  document.getElementById('historySelect').addEventListener('change', async e => {
    const date = e.target.value;
    document.getElementById('delHistBtn').classList.toggle('visible', !!date);
    if (!date) return;
    const data = await loadData(date);
    if (data) {
      allBooks = data.books;
      document.getElementById('updateTime').textContent = `Data from ${data.update_time}`;
      renderStats(data);
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      currentFilter = 'all'; applyFilters();
    }
  });
  document.getElementById('tokenModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeTokenModal(); });
}

// ── Init ──
async function init() {
  bindEvents();
  const [data, idx] = await Promise.all([loadData(), loadHistoryIndex(), loadReadList()]);
  historyDates = idx;
  if (data) {
    allBooks = data.books;
    document.getElementById('updateTime').textContent = `Updated ${data.update_time}`;
    renderStats(data); applyFilters();
  } else {
    document.getElementById('bookList').innerHTML = '<div class="empty-state">😢 No data yet.</div>';
  }
  rebuildHistoryDropdown(historyDates);
  renderReadChips();
}

init();
</script>
