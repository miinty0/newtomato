<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot 200</title>
<style>
:root {
  --bg:       #0d0d12;
  --bg2:      #14141c;
  --bg3:      #1c1c28;
  --card:     #181824;
  --border:   #26263a;
  --text:     #e6e6f0;
  --text2:    #8888aa;
  --accent:   #f06bab;
  --accent2:  #ff9cd3;
  --green:    #4ade80;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --tag-bg:   rgba(240,107,171,0.12);
  --tag-text: #ff9cd3;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.6; min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #14141f 0%, #10101a 100%);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
}
.header-inner {
  max-width: 1400px; margin: 0 auto; padding: 15px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.logo h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
.logo .subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
.header-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.update-badge {
  background: var(--bg3); padding: 6px 14px; border-radius: 20px;
  font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px;
}
.update-badge .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Admin buttons ── */
.admin-btn {
  padding: 6px 13px; border-radius: 8px; font-size: 12px;
  cursor: pointer; transition: all .2s; border: 1px solid var(--border);
  background: var(--bg2); color: var(--text2); white-space: nowrap;
}
.admin-btn:hover { border-color: var(--accent); color: var(--accent); }
.admin-btn.danger:hover { border-color: var(--red); color: var(--red); }
.admin-btn.running { opacity: .6; cursor: not-allowed; }

/* ── Stats bar ── */
.stats-bar {
  max-width: 1400px; margin: 18px auto 0; padding: 0 24px;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.stat-chip {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 7px 14px; border-radius: 10px; font-size: 13px; color: var(--text2);
  display: flex; align-items: center; gap: 5px;
}
.stat-chip .val { color: var(--text); font-weight: 600; }

/* ── Controls ── */
.controls {
  max-width: 1400px; margin: 14px auto; padding: 0 24px;
  display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
}
.search-box { flex: 1; min-width: 200px; max-width: 340px; position: relative; }
.search-box input {
  width: 100%; padding: 9px 13px 9px 36px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text2); }
.search-box .icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--text2); font-size: 14px;
}
.filter-btn {
  padding: 8px 15px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: rgba(240,107,171,0.15); border-color: var(--accent); color: var(--accent); }
.filter-btn.new-btn .new-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px;
  background: var(--yellow); color: #000; font-size: 11px;
  font-weight: 700; margin-left: 6px; line-height: 1;
}
.filter-btn.new-btn.active { background: rgba(251,191,36,.18); border-color: var(--yellow); color: var(--yellow); }
.filter-btn.new-btn:hover  { border-color: var(--yellow); color: var(--yellow); }
.filter-btn.new-btn.no-new { opacity: .5; cursor: default; }

/* ── History row ── */
.history-row {
  max-width: 1400px; margin: 0 auto 4px; padding: 0 24px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.history-select {
  padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px; outline: none; cursor: pointer;
}
.delete-history-btn {
  padding: 7px 13px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all .2s; display: none;
}
.delete-history-btn:hover { border-color: var(--red); color: var(--red); }
.delete-history-btn.visible { display: inline-block; }

/* ── New entries banner ── */
.new-banner { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: none; }
.new-banner.show { display: block; }
.new-banner-inner {
  background: linear-gradient(135deg, rgba(251,191,36,.10) 0%, rgba(240,107,171,.06) 100%);
  border: 1px solid rgba(251,191,36,.25); border-radius: 12px;
  padding: 13px 18px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.new-banner-icon { font-size: 20px; }
.new-banner-text { font-size: 14px; color: var(--yellow); font-weight: 600; }
.new-banner-text span { color: var(--text2); font-weight: 400; margin-left: 8px; font-size: 13px; }

/* ── Book list ── */
.book-list { max-width: 1400px; margin: 14px auto; padding: 0 24px 40px; }
.book-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 17px 20px; margin-bottom: 9px;
  display: flex; gap: 15px; align-items: stretch; transition: all .2s;
}
.book-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(240,107,171,.10); }
.book-card.is-new { border-color: rgba(251,191,36,.30); background: linear-gradient(135deg, var(--card) 0%, rgba(251,191,36,.04) 100%); }
.book-card.is-new:hover { border-color: var(--yellow); box-shadow: 0 4px 20px rgba(251,191,36,.10); }
.rank-col { flex-shrink: 0; width: 50px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.rank-num { font-size: 24px; font-weight: 800; line-height: 1; }
.rank-1 { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,.3); }
.rank-2 { color: #c0c0c0; text-shadow: 0 0 12px rgba(192,192,192,.2); }
.rank-3 { color: #cd7f32; text-shadow: 0 0 12px rgba(205,127,50,.2); }
.rank-other { color: var(--text2); }
.rank-change { font-size: 11px; margin-top: 4px; font-weight: 600; }
.rank-up   { color: var(--green); }
.rank-down { color: var(--red); }
.rank-same { color: var(--text2); }
.rank-new  { color: var(--yellow); font-size: 10px; font-weight: 700; background: rgba(251,191,36,.15); padding: 1px 6px; border-radius: 4px; }
.cover-col { flex-shrink: 0; width: 70px; }
.cover-img { width: 70px; height: 93px; border-radius: 7px; object-fit: cover; background: var(--bg3); border: 1px solid var(--border); }
.info-col { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.book-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.book-id { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-family: monospace; }
.book-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; }
.author-name { font-size: 13px; color: var(--text2); }
.status-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.status-ongoing   { background: rgba(74,222,128,.12); color: var(--green); }
.status-completed { background: rgba(153,153,179,.12); color: var(--text2); }
.tag-list { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--tag-bg); color: var(--tag-text); }
.abstract-col { flex: 0 0 360px; max-width: 360px; display: flex; align-items: center; border-left: 1px solid var(--border); padding-left: 18px; margin-left: 4px; }
.abstract-text { font-size: 13px; color: var(--text2); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
.loading { text-align: center; padding: 60px 0; color: var(--text2); }
.loading .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 0; color: var(--text2); }

/* ── Token modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw;
}
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.modal p  { font-size: 13px; color: var(--text2); margin-bottom: 18px; line-height: 1.5; }
.modal input[type="text"], .modal input[type="password"] {
  width: 100%; padding: 10px 13px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px;
  outline: none; margin-bottom: 10px; transition: border-color .2s;
}
.modal input:focus { border-color: var(--accent); }
.modal input::placeholder { color: var(--text2); }
.modal-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
.modal-actions { display: flex; gap: 9px; margin-top: 6px; }
.modal-btn {
  flex: 1; padding: 9px; border-radius: 10px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all .2s; border: none;
}
.modal-btn.primary { background: var(--accent); color: #fff; }
.modal-btn.primary:hover { background: var(--accent2); }
.modal-btn.secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.modal-btn.secondary:hover { border-color: var(--accent); color: var(--text); }
.modal-btn.danger-btn { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
.modal-btn.danger-btn:hover { background: rgba(248,113,113,.25); }
.modal-status { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
.modal-status.ok  { color: var(--green); }
.modal-status.err { color: var(--red); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg2); border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 10px; font-size: 13px;
  opacity: 0; transition: all .3s; z-index: 2000; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok  { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red);   color: var(--red); }

/* ── Responsive ── */
@media (max-width: 1024px) { .abstract-col { flex: 0 0 260px; max-width: 260px; } }
@media (max-width: 768px) {
  .header-inner, .stats-bar, .controls, .book-list, .new-banner, .history-row { padding-left: 16px; padding-right: 16px; }
  .book-card { padding: 13px; gap: 11px; flex-wrap: wrap; }
  .rank-col { width: 38px; } .rank-num { font-size: 19px; }
  .cover-col { width: 54px; } .cover-img { width: 54px; height: 72px; }
  .abstract-col { flex: 0 0 100%; max-width: 100%; border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 11px; margin-left: 0; margin-top: 4px; }
}
@media (max-width: 480px) { .cover-col { display: none; } .header-meta { width: 100%; } }
</style>
</head>
<body>

<!-- Token modal -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h2>Admin Setup</h2>
    <p>Enter your Token and repo to enable scrape triggering and history deletion.<br>Token is saved in your browser only.</p>
    <label class="modal-label">GitHub Token (needs <code>repo</code> + <code>workflow</code> scopes)</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <label class="modal-label">Repo (owner/name)</label>
    <input type="text" id="repoInput" placeholder="yourname/your-repo">
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeTokenModal()">Cancel</button>
      <button class="modal-btn danger-btn" onclick="clearToken()">Clear saved</button>
      <button class="modal-btn primary" onclick="saveToken()">Save</button>
    </div>
    <div class="modal-status" id="tokenStatus"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <h1>Female Hot 200</h1>
      <div class="subtitle">Daily Rankings</div>
    </div>
    <div class="header-meta">
      <div class="update-badge">
        <span class="dot"></span>
        <span id="updateTime">Loading...</span>
      </div>
      <button class="admin-btn" id="triggerBtn" onclick="triggerScrape()">▶ Run now</button>
      <button class="admin-btn" onclick="openTokenModal()">🔑 Token</button>
    </div>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search title, author, or genre...">
  </div>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn new-btn" data-filter="new" id="newFilterBtn">
    🆕 New Today <span class="new-count" id="newCount">0</span>
  </button>
  <button class="filter-btn" data-filter="ongoing">Ongoing</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
</div>

<div class="history-row">
  <select class="history-select" id="historySelect">
    <option value="">📅 History</option>
  </select>
  <button class="delete-history-btn" id="deleteHistoryBtn" onclick="deleteSelectedHistory()">🗑 Delete this date</button>
</div>

<div class="new-banner" id="newBanner">
  <div class="new-banner-inner">
    <span class="new-banner-icon">🔥</span>
    <div class="new-banner-text">
      <span id="newBannerCount">0</span> new entries today
      <span>· click above to filter</span>
    </div>
  </div>
</div>

<div class="book-list" id="bookList">
  <div class="loading"><div class="spinner"></div><div>Loading...</div></div>
</div>

<script>
// ── State ──
let allBooks = [];
let currentFilter = 'all';
let currentSearch = '';
let historyDates = [];

// ── Token helpers ──
function getToken() { return localStorage.getItem('gh_token') || ''; }
function getRepo()  { return localStorage.getItem('gh_repo')  || ''; }

function openTokenModal() {
  document.getElementById('tokenInput').value = getToken();
  document.getElementById('repoInput').value  = getRepo();
  document.getElementById('tokenStatus').textContent = '';
  document.getElementById('tokenModal').classList.add('open');
}
function closeTokenModal() {
  document.getElementById('tokenModal').classList.remove('open');
}
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  const r = document.getElementById('repoInput').value.trim();
  if (!t || !r) { setModalStatus('Both fields required', 'err'); return; }
  localStorage.setItem('gh_token', t);
  localStorage.setItem('gh_repo', r);
  setModalStatus('Saved ✓', 'ok');
  setTimeout(closeTokenModal, 800);
}
function clearToken() {
  localStorage.removeItem('gh_token');
  localStorage.removeItem('gh_repo');
  document.getElementById('tokenInput').value = '';
  document.getElementById('repoInput').value  = '';
  setModalStatus('Cleared', 'ok');
}
function setModalStatus(msg, type) {
  const el = document.getElementById('tokenStatus');
  el.textContent = msg;
  el.className = 'modal-status ' + (type || '');
}

// ── Toast ──
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Trigger scrape ──
async function triggerScrape() {
  const token = getToken(), repo = getRepo();
  if (!token || !repo) { openTokenModal(); return; }

  const today = new Date().toISOString().slice(0,10);
  const hasToday = historyDates.includes(today);
  if (hasToday) {
    const ok = confirm(`Data for ${today} already exists. Running now will overwrite it with a newer timestamp. Continue?`);
    if (!ok) return;
  }

  const btn = document.getElementById('triggerBtn');
  btn.classList.add('running');
  btn.textContent = '⏳ Triggering...';

  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/scrape.yml/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: 'main' }),
    });
    if (res.status === 204) {
      toast('✓ Scrape triggered — check Actions tab in ~1 min', 'ok');
    } else {
      const err = await res.json().catch(() => ({}));
      toast(`✗ ${err.message || 'Failed (' + res.status + ')'}`, 'err');
    }
  } catch (e) {
    toast('✗ Network error', 'err');
  }

  btn.classList.remove('running');
  btn.textContent = '▶ Run now';
}

// ── Delete history date ──
async function deleteSelectedHistory() {
  const token = getToken(), repo = getRepo();
  if (!token || !repo) { openTokenModal(); return; }

  const select = document.getElementById('historySelect');
  const date   = select.value;
  if (!date) { toast('Select a date first', 'err'); return; }

  const ok = confirm(`Delete history for ${date}? This removes the JSON file and updates the index.`);
  if (!ok) return;

  const btn = document.getElementById('deleteHistoryBtn');
  btn.textContent = '⏳ Deleting...';
  btn.style.pointerEvents = 'none';

  try {
    const filePath = `data/history/${date}.json`;
    const ghHeaders = {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
    };

    // Step 1: get current SHA of the file
    const infoRes = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, { headers: ghHeaders });
    if (!infoRes.ok) { toast(`✗ File not found on repo`, 'err'); return; }
    const info = await infoRes.json();
    const sha = info.sha;

    // Step 2: delete the file
    const delRes = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
      method: 'DELETE',
      headers: ghHeaders,
      body: JSON.stringify({ message: `remove ${date}`, sha }),
    });
    if (!delRes.ok) { toast('✗ Failed to delete file', 'err'); return; }

    // Step 3: update history_index.json
    const idxRes = await fetch(`https://api.github.com/repos/${repo}/contents/data/history_index.json`, { headers: ghHeaders });
    if (idxRes.ok) {
      const idxInfo = await idxRes.json();
      const idxContent = JSON.parse(atob(idxInfo.content));
      const newIdx = idxContent.filter(d => d !== date);
      await fetch(`https://api.github.com/repos/${repo}/contents/data/history_index.json`, {
        method: 'PUT',
        headers: ghHeaders,
        body: JSON.stringify({
          message: `remove ${date} from index`,
          sha: idxInfo.sha,
          content: btoa(JSON.stringify(newIdx, null, 2)),
        }),
      });
      // Update local list
      historyDates = newIdx;
      rebuildHistoryDropdown(historyDates);
    }

    toast(`✓ Deleted ${date}`, 'ok');

    // If we were viewing that date, reload latest
    if (select.value === '') {
      // already reset by rebuildHistoryDropdown
    }

  } catch (e) {
    toast('✗ Error: ' + e.message, 'err');
  }

  btn.textContent = '🗑 Delete this date';
  btn.style.pointerEvents = '';
}

// ── Data loading ──
async function loadData(date) {
  const url = date ? `data/history/${date}.json` : 'data/latest.json';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) { return null; }
}

async function loadHistoryIndex() {
  try {
    const res = await fetch('data/history_index.json');
    if (!res.ok) return [];
    return await res.json();
  } catch { return []; }
}

// ── Rebuild dropdown ──
function rebuildHistoryDropdown(dates) {
  const select = document.getElementById('historySelect');
  select.innerHTML = '<option value="">📅 History</option>';
  for (const date of dates) {
    const opt = document.createElement('option');
    opt.value = date; opt.textContent = date;
    select.appendChild(opt);
  }
  // hide delete button since selection reset
  document.getElementById('deleteHistoryBtn').classList.remove('visible');
}

// ── Stats ──
function renderStats(data) {
  const bar = document.getElementById('statsBar');
  if (!data) { bar.innerHTML = ''; return; }
  const sc = { Ongoing: 0, Completed: 0 };
  const cats = {};
  let newCount = 0;
  for (const b of data.books) {
    if (b.status === 'Ongoing') sc.Ongoing++;
    else if (b.status === 'Completed') sc.Completed++;
    for (const t of (b.tags||[])) cats[t] = (cats[t]||0) + 1;
    if (b.rank_change === 'new') newCount++;
  }
  const topCats = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  bar.innerHTML = `
    <div class="stat-chip">📚 Total <span class="val">${data.total_count}</span></div>
    <div class="stat-chip">📖 Ongoing <span class="val">${sc.Ongoing}</span></div>
    <div class="stat-chip">✅ Completed <span class="val">${sc.Completed}</span></div>
    ${topCats.map(([n,c])=>`<div class="stat-chip">${n} <span class="val">${c}</span></div>`).join('')}
  `;
  updateNewCount(newCount);
}

function updateNewCount(count) {
  document.getElementById('newCount').textContent = count;
  document.getElementById('newBannerCount').textContent = count;
  const btn = document.getElementById('newFilterBtn');
  const banner = document.getElementById('newBanner');
  if (count > 0) { btn.classList.remove('no-new'); banner.classList.add('show'); }
  else           { btn.classList.add('no-new');    banner.classList.remove('show'); }
}

// ── Render ──
function renderRankChange(change) {
  if (change === 'new') return `<div class="rank-change rank-new">NEW</div>`;
  if (change === 0)     return `<div class="rank-change rank-same">—</div>`;
  if (change > 0)       return `<div class="rank-change rank-up">▲${change}</div>`;
  if (change < 0)       return `<div class="rank-change rank-down">▼${Math.abs(change)}</div>`;
  return '';
}

function renderBookCard(book) {
  const rankClass   = book.rank <= 3 ? `rank-${book.rank}` : 'rank-other';
  const statusClass = book.status === 'Ongoing' ? 'status-ongoing' : 'status-completed';
  const isNew = book.rank_change === 'new';
  let coverSrc = book.thumb_url || '';
  if (coverSrc.startsWith('http://')) coverSrc = coverSrc.replace('http://', 'https://');
  const ph = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='70' height='93'><rect width='70' height='93' fill='%231c1c28'/><text x='35' y='50' text-anchor='middle' fill='%23666' font-size='22'>📖</text></svg>`;
  return `
    <div class="book-card ${isNew?'is-new':''}">
      <div class="rank-col">
        <div class="rank-num ${rankClass}">${book.rank}</div>
        ${renderRankChange(book.rank_change)}
      </div>
      <div class="cover-col">
        <img class="cover-img" src="${coverSrc}" alt="" loading="lazy" onerror="this.src='${ph}'">
      </div>
      <div class="info-col">
        <div class="book-title">${esc(book.book_name)}</div>
        <div class="book-id">${esc(book.book_id)}</div>
        <div class="book-meta">
          <span class="author-name">✍ ${esc(book.author)}</span>
          <span class="status-badge ${statusClass}">${book.status}</span>
        </div>
        <div class="tag-list">${(book.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      </div>
      <div class="abstract-col">
        <div class="abstract-text">${esc(book.abstract)}</div>
      </div>
    </div>`;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBookList(books) {
  const c = document.getElementById('bookList');
  if (!books || books.length === 0) {
    c.innerHTML = `<div class="empty-state">${currentFilter==='new'?'😊 No new entries today — check back tomorrow!':'😢 No results'}</div>`;
    return;
  }
  c.innerHTML = books.map(renderBookCard).join('');
}

function applyFilters() {
  let f = [...allBooks];
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    f = f.filter(b =>
      b.book_name.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q) ||
      (b.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
      (b.abstract||'').toLowerCase().includes(q)
    );
  }
  switch(currentFilter) {
    case 'ongoing':   f = f.filter(b=>b.status==='Ongoing');   break;
    case 'completed': f = f.filter(b=>b.status==='Completed'); break;
    case 'new':       f = f.filter(b=>b.rank_change==='new');  break;
  }
  const banner = document.getElementById('newBanner');
  if (currentFilter === 'all') {
    allBooks.filter(b=>b.rank_change==='new').length > 0 ? banner.classList.add('show') : banner.classList.remove('show');
  } else banner.classList.remove('show');
  renderBookList(f);
}

// ── Events ──
function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value.trim(); applyFilters();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('no-new')) return;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  const sel = document.getElementById('historySelect');
  const delBtn = document.getElementById('deleteHistoryBtn');

  sel.addEventListener('change', async e => {
    const date = e.target.value;
    // Show/hide delete button
    if (date) delBtn.classList.add('visible');
    else      delBtn.classList.remove('visible');

    if (!date) return;
    const data = await loadData(date);
    if (data) {
      allBooks = data.books;
      document.getElementById('updateTime').textContent = `Data from ${data.update_time}`;
      renderStats(data);
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      currentFilter = 'all'; applyFilters();
    }
  });

  // Close modal on backdrop click
  document.getElementById('tokenModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeTokenModal();
  });
}

// ── Init ──
async function init() {
  bindEvents();
  const [data, idx] = await Promise.all([loadData(), loadHistoryIndex()]);
  historyDates = idx;

  if (data) {
    allBooks = data.books;
    document.getElementById('updateTime').textContent = `Updated ${data.update_time}`;
    renderStats(data); applyFilters();
  } else {
    document.getElementById('bookList').innerHTML = '<div class="empty-state">😢 No data available.</div>';
  }

  rebuildHistoryDropdown(historyDates);
}

init();
</script>
</body>
